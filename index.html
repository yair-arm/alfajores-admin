<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="description" content="App de administración de producción y ventas de Alfajores Yair" />
  <title>Alfajores Yair</title>

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <style>
    /* ===== RESET & BASE ===== */
    *, *::before, *::after {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
    }

    html, body {
      margin: 0;
      padding: 0;
      background-color: #0f172a;
      color: #f1f5f9;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      min-height: 100dvh;
      overscroll-behavior: none;
    }

    body {
      overflow-y: auto;
    }

    /* ===== CUSTOM SCROLLBAR (desktop preview) ===== */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #0f172a; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }

    /* ===== HEADER ===== */
    #header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 50;
      background: #0f172a;
      border-bottom: 1px solid rgba(51, 65, 85, 0.6);
      padding: 14px 16px 12px;
    }

    /* ===== MAIN CONTENT ===== */
    #main-content {
      padding-top: 100px;
      padding-bottom: 32px;
      max-width: 480px;
      margin: 0 auto;
      padding-left: 16px;
      padding-right: 16px;
    }

    /* ===== PULSING DOT ===== */
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(1.3); }
    }
    .pulse-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #22c55e;
      animation: pulse-dot 2s ease-in-out infinite;
      display: inline-block;
    }

    /* ===== SEGMENTED CONTROL ===== */
    #mode-switch {
      display: flex;
      width: 100%;
      height: 52px;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 14px;
      padding: 4px;
      gap: 4px;
    }

    .mode-btn {
      flex: 1;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      font-weight: 700;
      font-size: 14px;
      letter-spacing: 0.5px;
      transition: all 300ms ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      -webkit-tap-highlight-color: transparent;
    }

    .mode-btn.inactive {
      background: transparent;
      color: #64748b;
    }

    .mode-btn.active-hechos {
      background: linear-gradient(135deg, #d97706, #b45309);
      color: #0f172a;
      box-shadow: 0 2px 12px rgba(217, 119, 6, 0.4);
    }

    .mode-btn.active-ventas {
      background: linear-gradient(135deg, #10b981, #059669);
      color: #0f172a;
      box-shadow: 0 2px 12px rgba(16, 185, 129, 0.4);
    }

    /* ===== PRODUCT CARDS ===== */
    .card {
      background: #1e293b;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
      border: 1px solid #334155;
      border-left: 4px solid #334155;
      transition: border-left-color 300ms ease;
    }

    .card.mode-hechos {
      border-left-color: #d97706;
    }

    .card.mode-ventas {
      border-left-color: #10b981;
    }

    /* ===== QUANTITY CONTROLS ===== */
    .qty-btn {
      width: 56px;
      height: 56px;
      min-width: 56px;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      font-size: 28px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      transition: transform 150ms ease;
      -webkit-tap-highlight-color: transparent;
      line-height: 1;
      padding: 0;
    }

    .qty-btn:active {
      transform: scale(0.92);
    }

    .qty-btn-minus {
      background: #dc2626;
      box-shadow: 0 4px 12px rgba(220, 38, 38, 0.3);
    }

    .qty-btn-plus {
      background: #16a34a;
      box-shadow: 0 4px 12px rgba(22, 163, 74, 0.3);
    }

    .qty-input {
      flex: 1;
      height: 56px;
      background: #0f172a;
      border: 2px solid #334155;
      border-radius: 12px;
      color: #f1f5f9;
      font-size: 28px;
      font-weight: 700;
      text-align: center;
      font-family: 'Inter', sans-serif;
      outline: none;
      -webkit-appearance: none;
      -moz-appearance: textfield;
      appearance: none;
      transition: border-color 300ms ease;
      min-width: 0;
    }

    .qty-input::-webkit-inner-spin-button,
    .qty-input::-webkit-outer-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    .qty-input:focus {
      border-color: var(--accent-color, #334155);
    }

    /* ===== MODE BADGE ===== */
    .mode-badge {
      font-size: 10px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 20px;
      letter-spacing: 0.8px;
      transition: all 300ms ease;
    }

    .mode-badge.badge-hechos {
      background: rgba(217, 119, 6, 0.2);
      color: #d97706;
      border: 1px solid rgba(217, 119, 6, 0.4);
    }

    .mode-badge.badge-ventas {
      background: rgba(16, 185, 129, 0.2);
      color: #10b981;
      border: 1px solid rgba(16, 185, 129, 0.4);
    }

    /* ===== CONFIRM BUTTON ===== */
    #btn-confirmar {
      width: 100%;
      height: 60px;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      font-size: 18px;
      font-weight: 700;
      color: #0f172a;
      transition: all 200ms ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      -webkit-tap-highlight-color: transparent;
      position: relative;
      overflow: hidden;
    }

    #btn-confirmar:active:not(:disabled) {
      transform: scale(0.97);
    }

    #btn-confirmar:disabled {
      cursor: not-allowed;
      opacity: 0.8;
    }

    #btn-confirmar.mode-hechos {
      background: linear-gradient(135deg, #d97706, #b45309);
      box-shadow: 0 6px 20px rgba(217, 119, 6, 0.35);
    }

    #btn-confirmar.mode-ventas {
      background: linear-gradient(135deg, #10b981, #059669);
      box-shadow: 0 6px 20px rgba(16, 185, 129, 0.35);
    }

    /* ===== FINALIZAR DÍA BUTTON ===== */
    #btn-finalizar {
      width: 100%;
      height: 50px;
      background: transparent;
      border: 2px solid #f97316;
      border-radius: 14px;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      font-size: 16px;
      font-weight: 600;
      color: #f97316;
      transition: all 200ms ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      -webkit-tap-highlight-color: transparent;
    }

    #btn-finalizar:active {
      transform: scale(0.97);
      background: rgba(249, 115, 22, 0.08);
    }

    /* ===== SPINNER ===== */
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .spinner {
      width: 22px;
      height: 22px;
      border: 3px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: inline-block;
      flex-shrink: 0;
    }

    /* ===== MODAL ===== */
    #modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(0, 0, 0, 0.75);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 250ms ease;
    }

    #modal-overlay.visible {
      opacity: 1;
      pointer-events: all;
    }

    #modal-card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 20px;
      padding: 28px 24px;
      width: 100%;
      max-width: 340px;
      transform: scale(0.92) translateY(12px);
      transition: transform 250ms ease;
    }

    #modal-overlay.visible #modal-card {
      transform: scale(1) translateY(0);
    }

    .modal-btn {
      flex: 1;
      height: 48px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 600;
      transition: all 180ms ease;
      -webkit-tap-highlight-color: transparent;
    }

    .modal-btn:active {
      transform: scale(0.96);
    }

    .modal-btn-cancel {
      background: #334155;
      color: #94a3b8;
    }

    .modal-btn-confirm {
      background: #dc2626;
      color: #fff;
      box-shadow: 0 4px 12px rgba(220, 38, 38, 0.35);
    }

    /* ===== TOAST ===== */
    @keyframes toast-in {
      from {
        opacity: 0;
        transform: translateX(-50%) translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
    }

    @keyframes toast-out {
      from {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
      to {
        opacity: 0;
        transform: translateX(-50%) translateY(12px);
      }
    }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 200;
      min-width: 240px;
      max-width: calc(100vw - 32px);
      padding: 14px 18px;
      border-radius: 14px;
      border: 1px solid;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.5);
      animation: toast-in 300ms ease forwards;
      white-space: nowrap;
    }

    .toast.hiding {
      animation: toast-out 300ms ease forwards;
    }

    .toast-success {
      background: #065f46;
      border-color: #10b981;
      color: #d1fae5;
    }

    .toast-error {
      background: #7f1d1d;
      border-color: #dc2626;
      color: #fee2e2;
    }

    .toast-warning {
      background: #78350f;
      border-color: #d97706;
      color: #fef3c7;
    }

    /* ===== REPORTE CIERRE ===== */
    #resultado-cierre {
      display: none;
    }

    @keyframes reporte-in {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    #resultado-cierre .card {
      animation: reporte-in 400ms ease forwards;
    }

    /* ===== DIVIDER ===== */
    .section-gap { margin-top: 14px; }
  </style>
</head>
<body>

  <!-- ==============================
       HEADER FIJO
  ============================== -->
  <header id="header">
    <!-- Título -->
    <div style="text-align: center; margin-bottom: 6px;">
      <span style="font-size: 22px; font-weight: 800; color: #f1f5f9; letter-spacing: -0.3px;">
        🍫&nbsp;Alfajores Yair
      </span>
    </div>

    <!-- Reloj + Estado -->
    <div style="display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 4px;">
      <div id="reloj" style="font-size: 12px; color: #94a3b8; font-weight: 500; flex: 1;">
        Cargando…
      </div>
      <div style="display: flex; align-items: center; gap: 6px; flex-shrink: 0;">
        <span class="pulse-dot"></span>
        <span style="font-size: 11px; color: #22c55e; font-weight: 600;">Sistema activo</span>
      </div>
    </div>
  </header>

  <!-- ==============================
       CONTENIDO PRINCIPAL
  ============================== -->
  <main id="main-content">

    <!-- 1. SWITCH MAESTRO HECHOS / VENTAS -->
    <div id="mode-switch">
      <button id="btn-hechos" class="mode-btn active-hechos" onclick="cambiarModo('hechos')">
        📦&nbsp;HECHOS
      </button>
      <button id="btn-ventas" class="mode-btn inactive" onclick="cambiarModo('ventas')">
        💰&nbsp;VENTAS
      </button>
    </div>

    <!-- 2. TARJETA NUTELLA -->
    <div class="card mode-hechos section-gap" id="card-nutella">
      <!-- Header -->
      <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 16px;">
        <span style="font-size: 22px; line-height: 1;">🫙</span>
        <span style="font-size: 17px; font-weight: 700; color: #f1f5f9; flex: 1;">Nutella</span>
        <span class="mode-badge badge-hechos" id="badge-nutella">HECHOS</span>
      </div>
      <!-- Controles -->
      <div style="display: flex; align-items: center; gap: 10px;">
        <button class="qty-btn qty-btn-minus" onclick="cambiarCantidad('nutella', -1)" aria-label="Restar Nutella">−</button>
        <input
          id="input-nutella"
          class="qty-input"
          type="number"
          inputmode="numeric"
          pattern="[0-9]*"
          value="0"
          min="0"
          max="999"
          onchange="validarInput('nutella')"
          oninput="validarInput('nutella')"
          aria-label="Cantidad Nutella"
        />
        <button class="qty-btn qty-btn-plus" onclick="cambiarCantidad('nutella', 1)" aria-label="Sumar Nutella">+</button>
      </div>
    </div>

    <!-- 3. TARJETA AREQUIPE -->
    <div class="card mode-hechos section-gap" id="card-arequipe">
      <!-- Header -->
      <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 16px;">
        <span style="font-size: 22px; line-height: 1;">🥛</span>
        <span style="font-size: 17px; font-weight: 700; color: #f1f5f9; flex: 1;">Arequipe</span>
        <span class="mode-badge badge-hechos" id="badge-arequipe">HECHOS</span>
      </div>
      <!-- Controles -->
      <div style="display: flex; align-items: center; gap: 10px;">
        <button class="qty-btn qty-btn-minus" onclick="cambiarCantidad('arequipe', -1)" aria-label="Restar Arequipe">−</button>
        <input
          id="input-arequipe"
          class="qty-input"
          type="number"
          inputmode="numeric"
          pattern="[0-9]*"
          value="0"
          min="0"
          max="999"
          onchange="validarInput('arequipe')"
          oninput="validarInput('arequipe')"
          aria-label="Cantidad Arequipe"
        />
        <button class="qty-btn qty-btn-plus" onclick="cambiarCantidad('arequipe', 1)" aria-label="Sumar Arequipe">+</button>
      </div>
    </div>

    <!-- 4. BOTÓN CONFIRMAR REGISTRO -->
    <div class="section-gap">
      <button id="btn-confirmar" class="mode-hechos" onclick="confirmarRegistro()">
        <span id="btn-confirmar-content">✓&nbsp;Confirmar Registro</span>
      </button>
    </div>

    <!-- 5. BOTÓN FINALIZAR DÍA -->
    <div class="section-gap">
      <button id="btn-finalizar" onclick="abrirModal()">
        🌙&nbsp;Finalizar Día
      </button>
    </div>

    <!-- 6. CONTENEDOR REPORTE DE CIERRE (oculto hasta recibir respuesta) -->
    <div id="resultado-cierre" class="section-gap"></div>

  </main>

  <!-- ==============================
       MODAL FINALIZAR DÍA
  ============================== -->
  <div id="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title" onclick="cerrarModalOverlay(event)">
    <div id="modal-card">
      <div style="text-align: center; margin-bottom: 8px;">
        <span style="font-size: 40px;">🌙</span>
      </div>
      <h2 id="modal-title" style="font-size: 20px; font-weight: 800; color: #f1f5f9; text-align: center; margin: 0 0 10px;">
        ¿Finalizar el día?
      </h2>
      <p style="font-size: 13px; color: #94a3b8; text-align: center; margin: 0 0 24px; line-height: 1.55;">
        Se enviará el cierre de jornada. Esta acción no se puede deshacer.
      </p>
      <div style="display: flex; gap: 10px;">
        <button class="modal-btn modal-btn-cancel" onclick="cerrarModal()">Cancelar</button>
        <button class="modal-btn modal-btn-confirm" id="btn-modal-confirm" onclick="finalizarDia()">
          Sí, finalizar
        </button>
      </div>
    </div>
  </div>

  <!-- ==============================
       JAVASCRIPT
  ============================== -->
  <script>
    // ─── ESTADO GLOBAL ───────────────────────────────────
    let modo     = 'hechos'; // 'hechos' | 'ventas'
    let nutella  = 0;
    let arequipe = 0;
    let isSending = false;
    let toastTimeout = null;

    // ─── RELOJ ───────────────────────────────────────────
    const DIAS  = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
    const MESES = ['enero','febrero','marzo','abril','mayo','junio',
                   'julio','agosto','septiembre','octubre','noviembre','diciembre'];

    function actualizarReloj() {
      const ahora     = new Date();
      const diaNombre = DIAS[ahora.getDay()];
      const diaNro    = ahora.getDate();
      const mesNombre = MESES[ahora.getMonth()];
      const anio      = ahora.getFullYear();
      const hh        = String(ahora.getHours()).padStart(2, '0');
      const mm        = String(ahora.getMinutes()).padStart(2, '0');
      const ss        = String(ahora.getSeconds()).padStart(2, '0');

      const fechaStr = `${diaNombre}, ${diaNro} de ${mesNombre} de ${anio}`;
      const horaStr  = `${hh}:${mm}:${ss}`;

      document.getElementById('reloj').innerHTML =
        `<span style="font-weight:600;color:#cbd5e1;">${fechaStr}</span>&nbsp;·&nbsp;<span style="color:#94a3b8;">${horaStr}</span>`;
    }

    actualizarReloj();
    setInterval(actualizarReloj, 1000);

    // ─── ACTUALIZAR UI ───────────────────────────────────
    function actualizarUI() {
      const esHechos = (modo === 'hechos');

      const btnH = document.getElementById('btn-hechos');
      const btnV = document.getElementById('btn-ventas');

      if (esHechos) {
        btnH.className = 'mode-btn active-hechos';
        btnV.className = 'mode-btn inactive';
      } else {
        btnH.className = 'mode-btn inactive';
        btnV.className = 'mode-btn active-ventas';
      }

      ['card-nutella', 'card-arequipe'].forEach(id => {
        const el = document.getElementById(id);
        el.classList.remove('mode-hechos', 'mode-ventas');
        el.classList.add(esHechos ? 'mode-hechos' : 'mode-ventas');
      });

      const badgeClass = esHechos ? 'badge-hechos' : 'badge-ventas';
      const badgeAlt   = esHechos ? 'badge-ventas' : 'badge-hechos';
      const badgeText  = esHechos ? 'HECHOS' : 'VENTAS';

      ['badge-nutella', 'badge-arequipe'].forEach(id => {
        const el = document.getElementById(id);
        el.classList.remove(badgeAlt);
        el.classList.add(badgeClass);
        el.textContent = badgeText;
      });

      const accentColor = esHechos ? '#d97706' : '#10b981';
      document.documentElement.style.setProperty('--accent-color', accentColor);

      const btnC = document.getElementById('btn-confirmar');
      btnC.classList.remove('mode-hechos', 'mode-ventas');
      btnC.classList.add(esHechos ? 'mode-hechos' : 'mode-ventas');
    }

    // ─── CAMBIAR MODO ────────────────────────────────────
    function cambiarModo(nuevoModo) {
      if (modo === nuevoModo) return;
      modo = nuevoModo;
      actualizarUI();
    }

    // ─── CAMBIAR CANTIDAD ────────────────────────────────
    function cambiarCantidad(producto, delta) {
      if (producto === 'nutella') {
        nutella = Math.min(999, Math.max(0, nutella + delta));
        document.getElementById('input-nutella').value = nutella;
      } else {
        arequipe = Math.min(999, Math.max(0, arequipe + delta));
        document.getElementById('input-arequipe').value = arequipe;
      }
    }

    // ─── VALIDAR INPUT MANUAL ────────────────────────────
    function validarInput(producto) {
      const input = document.getElementById(`input-${producto}`);
      let val = parseInt(input.value, 10);
      if (isNaN(val) || val < 0) val = 0;
      if (val > 999) val = 999;
      if (producto === 'nutella') nutella = val;
      else arequipe = val;
      input.value = val;
    }

    // ─── OBTENER FECHA/HORA ACTUALES ─────────────────────
    function getFechaHora() {
      const ahora = new Date();
      const yyyy  = ahora.getFullYear();
      const MM    = String(ahora.getMonth() + 1).padStart(2, '0');
      const dd    = String(ahora.getDate()).padStart(2, '0');
      const hh    = String(ahora.getHours()).padStart(2, '0');
      const mm    = String(ahora.getMinutes()).padStart(2, '0');
      const ss    = String(ahora.getSeconds()).padStart(2, '0');
      return {
        fecha: `${yyyy}-${MM}-${dd}`,
        hora:  `${hh}:${mm}:${ss}`
      };
    }

    // ─── LOADING STATE ───────────────────────────────────
    function setLoading(estado) {
      isSending = estado;
      const btn  = document.getElementById('btn-confirmar');
      const cont = document.getElementById('btn-confirmar-content');
      btn.disabled = estado;
      if (estado) {
        cont.innerHTML = `<span class="spinner"></span><span style="color:#fff;">Enviando...</span>`;
      } else {
        cont.innerHTML = `✓&nbsp;Confirmar Registro`;
      }
    }

    // ─── CONFIRMAR REGISTRO ──────────────────────────────
    async function confirmarRegistro() {
      if (isSending) return;

      if (nutella === 0 && arequipe === 0) {
        mostrarToast('warning', '⚠️ Ingresa al menos un valor');
        return;
      }

      const { fecha, hora } = getFechaHora();
      let payload;

      if (modo === 'hechos') {
        payload = {
          fuente:          'app',
          nutella_hechos:  nutella,
          arequipe_hechos: arequipe,
          fecha:           fecha,
          hora:            hora
        };
      } else {
        payload = {
          fuente:          'app',
          nutella_ventas:  nutella,
          arequipe_ventas: arequipe,
          fecha:           fecha,
          hora:            hora
        };
      }

      setLoading(true);

      try {
        const response = await fetch('https://alfajores-yair.duckdns.org/webhook/registrar-alfajores', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify(payload)
        });

        if (response.ok) {
          mostrarToast('success', '✅ Registrado correctamente');
          nutella  = 0;
          arequipe = 0;
          document.getElementById('input-nutella').value  = 0;
          document.getElementById('input-arequipe').value = 0;
        } else {
          mostrarToast('error', '❌ Error de conexión');
        }
      } catch (_) {
        mostrarToast('error', '❌ Error de conexión');
      } finally {
        setLoading(false);
      }
    }

    // ─── MODAL FINALIZAR DÍA ─────────────────────────────
    function abrirModal() {
      document.getElementById('modal-overlay').classList.add('visible');
      document.getElementById('btn-modal-confirm').disabled = false;
      document.getElementById('btn-modal-confirm').textContent = 'Sí, finalizar';
    }

    function cerrarModal() {
      document.getElementById('modal-overlay').classList.remove('visible');
    }

    function cerrarModalOverlay(e) {
      if (e.target === document.getElementById('modal-overlay')) cerrarModal();
    }

    // ─── FINALIZAR DÍA (con reporte de cierre) ───────────
    async function finalizarDia() {
      const btnConf = document.getElementById('btn-modal-confirm');
      if (btnConf.disabled) return;

      const { fecha } = getFechaHora();
      const payload = { fuente: 'app', modo: 'fin_dia', fecha: fecha };

      btnConf.disabled = true;
      btnConf.innerHTML = `<span class="spinner" style="width:18px;height:18px;border-width:2px;"></span>&nbsp;Enviando…`;

      try {
        const response = await fetch('https://alfajores-yair.duckdns.org/webhook/registrar-alfajores', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify(payload)
        });

        if (response.ok) {
          const data    = await response.json();
          const reporte = data[0]; // Primera fila que devuelve n8n

          cerrarModal();
          mostrarToast('success', '✅ Día finalizado correctamente');

          // Pintar el reporte en el contenedor
          const contenedor = document.getElementById('resultado-cierre');
          contenedor.style.display = 'block';
          contenedor.innerHTML = `
            <div class="card" style="border-left-color: #f97316;">
              <h3 style="
                color: #f97316;
                font-size: 15px;
                font-weight: 800;
                margin: 0 0 16px;
                text-align: center;
                letter-spacing: 0.5px;
              ">📊 RESUMEN DEL DÍA</h3>

              <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; font-size: 14px; align-items: center;">

                <div style="color: #94a3b8; font-weight: 500;">Ingresos</div>
                <div style="text-align: right; font-weight: 700; color: #f1f5f9;">
                  $${Number(reporte.Ingresos || 0).toLocaleString('es-CO')}
                </div>

                <div style="color: #94a3b8; font-weight: 500;">CAPEX</div>
                <div style="text-align: right; font-weight: 700; color: #f1f5f9;">
                  $${Number(reporte.CAPEX || 0).toLocaleString('es-CO')}
                </div>

                <div style="grid-column: span 2; border-bottom: 1px solid #334155; margin: 4px 0;"></div>

                <div style="color: #22c55e; font-weight: 700; font-size: 15px;">Utilidad neta</div>
                <div style="text-align: right; color: #22c55e; font-weight: 800; font-size: 16px;">
                  $${Number(reporte['Utilidad neta'] || 0).toLocaleString('es-CO')}
                </div>

              </div>

              <div style="
                margin-top: 14px;
                padding-top: 12px;
                border-top: 1px solid #1e3a2e;
                display: flex;
                justify-content: space-between;
                font-size: 12px;
                color: #64748b;
              ">
                <span>Ahorro: <strong style="color:#94a3b8;">$${Number(reporte.Ahorro || 0).toLocaleString('es-CO')}</strong></span>
                <span>Salario: <strong style="color:#94a3b8;">$${Number(reporte.Salario || 0).toLocaleString('es-CO')}</strong></span>
              </div>
            </div>
          `;

          // Scroll suave al reporte
          contenedor.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

        } else {
          cerrarModal();
          mostrarToast('error', '❌ Error al finalizar el día');
        }
      } catch (error) {
        cerrarModal();
        mostrarToast('error', '❌ Error de conexión');
      } finally {
        btnConf.disabled = false;
        btnConf.textContent = 'Sí, finalizar';
      }
    }

    // ─── TOAST ───────────────────────────────────────────
    function mostrarToast(tipo, mensaje) {
      const existing = document.getElementById('toast-current');
      if (existing) {
        clearTimeout(toastTimeout);
        existing.remove();
      }

      const toast = document.createElement('div');
      toast.id = 'toast-current';
      toast.className = `toast toast-${tipo}`;
      toast.setAttribute('role', 'alert');
      toast.setAttribute('aria-live', 'polite');
      toast.textContent = mensaje;
      document.body.appendChild(toast);

      toastTimeout = setTimeout(() => {
        toast.classList.add('hiding');
        setTimeout(() => {
          if (toast.parentNode) toast.remove();
        }, 310);
      }, 2500);
    }

    // ─── INICIALIZAR ─────────────────────────────────────
    actualizarUI();
  </script>

</body>
</html>
